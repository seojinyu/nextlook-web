<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>NextLook - Dark Impact</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #eee;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
}
.poster {
  width: 1080px;
  height: 1080px;
  background: #0A0A0A;
  position: relative;
  font-family: 'Pretendard Variable', Pretendard, sans-serif;
  overflow: hidden;
  padding: 100px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  color: #fff;
}
.top-label {
  display: flex;
  align-items: center;
  gap: 12px;
}
.accent-line {
  width: 40px;
  height: 3px;
  background: #1B6B4A;
  border-radius: 2px;
}
.label {
  font-size: 20px;
  font-weight: 800;
  color: #1B6B4A;
  letter-spacing: 4px;
}
.main-text {
  display: flex;
  flex-direction: column;
  gap: 0;
}
.line {
  font-size: 140px;
  font-weight: 900;
  color: #fff;
  letter-spacing: -6px;
  line-height: 1.1;
}
.highlight {
  color: #1B6B4A;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 700;
}
.bottom {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
}
.detail {
  font-size: 22px;
  font-weight: 500;
  color: rgba(255,255,255,0.5);
  letter-spacing: -0.3px;
  line-height: 1.4;
  max-width: 500px;
}
.brand {
  text-align: right;
}
.brand-name {
  font-size: 32px;
  font-weight: 900;
  color: #fff;
  letter-spacing: -0.5px;
}
.brand-url {
  font-size: 16px;
  font-weight: 700;
  color: #1B6B4A;
  letter-spacing: 2px;
  margin-top: 6px;
}
</style>
</head>
<body>
<div class="poster">
  <div class="top-label">
    <div class="accent-line"></div>
    <div class="label">THE TRUTH</div>
  </div>

  <div class="main-text">
    <div class="line">당신의 옷장에</div>
    <div class="line">잠자는 옷들이</div>
    <div class="line highlight">몇 벌인가요?</div>
  </div>

  <div class="bottom">
    <div class="detail">
      NextLook 사용자 평균<br>
      1년간 안 입은 옷 <b style="color:#fff">27벌</b>
    </div>
    <div class="brand">
      <div class="brand-name">NEXTLOOK</div>
      <div class="brand-url">nextlook.co.kr</div>
    </div>
  </div>
</div>
</body>
</html>
