<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>NextLook - Hero</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #eee;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
}
.poster {
  width: 1080px;
  height: 1080px;
  background: #FAFAF8;
  position: relative;
  font-family: 'Pretendard Variable', Pretendard, sans-serif;
  overflow: hidden;
  padding: 100px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}
.top-label {
  display: flex;
  align-items: center;
  gap: 12px;
}
.accent-line {
  width: 40px;
  height: 3px;
  background: #1B6B4A;
  border-radius: 2px;
}
.label {
  font-size: 20px;
  font-weight: 800;
  color: #1B6B4A;
  letter-spacing: 4px;
}
.main-text {
  display: flex;
  flex-direction: column;
  gap: 0;
}
.line-1 {
  font-size: 180px;
  font-weight: 900;
  color: #1A1A1A;
  letter-spacing: -8px;
  line-height: 1;
  margin-bottom: 20px;
}
.line-2 {
  font-size: 180px;
  font-weight: 900;
  color: #1B6B4A;
  letter-spacing: -8px;
  line-height: 1;
}
.bottom {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
}
.tagline {
  font-family: 'Cormorant Garamond', serif;
  font-size: 42px;
  font-style: italic;
  color: #7A7570;
  font-weight: 500;
}
.brand {
  text-align: right;
}
.brand-name {
  font-size: 36px;
  font-weight: 900;
  color: #1A1A1A;
  letter-spacing: -1px;
}
.brand-url {
  font-size: 18px;
  font-weight: 600;
  color: #7A7570;
  letter-spacing: 1px;
  margin-top: 8px;
}
</style>
</head>
<body>
<div class="poster">
  <div class="top-label">
    <div class="accent-line"></div>
    <div class="label">DAILY LOOK · 2026</div>
  </div>

  <div class="main-text">
    <div class="line-1">매일 아침</div>
    <div class="line-2">옷 뭐 입지?</div>
  </div>

  <div class="bottom">
    <div class="tagline">This ends today.</div>
    <div class="brand">
      <div class="brand-name">NEXTLOOK</div>
      <div class="brand-url">nextlook.co.kr</div>
    </div>
  </div>
</div>
</body>
</html>
